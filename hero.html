<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Peace Valari — Presentation</title>
  <link rel="stylesheet" href="hero.css" />
</head>
<body>

  <header class="hero">
     <div class="hero-logo">
    <img src="images/aalogo.png" alt="Logo" />
  </div>


  <div class="hero-inner container">
    <!-- LEFT SIDE -->
    <div class="hero-left">
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-number">+7</span>
          <span class="stat-label">Years Experience</span>
        </div>
        <div class="stat">
          <span class="stat-number">+3</span>
          <span class="stat-label">Industries Analyzed</span>
        </div>
      </div>

      <h1 class="hero-name">Peace Valari</h1>
      <p class="hero-tagline">Optimizing Complexity with Analytics and Insight.</p>

      <div class="hero-ctas">
        <a class="btn neumorphic" href="market.html" id="go-projects">View My Work</a>
      </div>
    </div>

    <div class="hero-right">
      <img src="images/ageda1.png" alt="Project Showcase" class="hero-gif" />
    </div>
  </div>

  <!-- VERTICAL LINE & LABELS -->
  <div class="hero-line">
    <span class="line-top">Data Analyst</span>
    <div class="line"></div>
    <span class="line-bottom">2026</span>
  </div>
</header>



<footer class="footer">
  <p>&copy; All Rights Reserved 2026 | Designed by Peace Valari</p>
</footer>


  <script src="hero.js"></script>

</html>
